<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>业务 AI 助手</title>
<style>
:root {
  --primary: #4f46e5; --primary-light: #eef2ff; --bg: #f8fafc;
  --surface: #ffffff; --border: #e2e8f0; --text: #1e293b;
  --text-secondary: #64748b; --user-bubble: #4f46e5; --ai-bubble: #f1f5f9;
  --danger: #ef4444; --success: #10b981; --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.header .logo { width: 32px; height: 32px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; font-weight: 700; }
.chat { flex: 1; overflow-y: auto; padding: 16px 0; }
.chat-inner { max-width: 800px; margin: 0 auto; padding: 0 16px; display: flex; flex-direction: column; gap: 6px; }
.welcome { text-align: center; padding: 40px 20px 20px; }
.welcome h2 { font-size: 20px; margin-bottom: 6px; }
.welcome p { color: var(--text-secondary); font-size: 13px; margin-bottom: 20px; }
.quick-asks { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 600px; margin: 0 auto; }
.quick-asks button { font-size: 12px; padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px; background: var(--surface); color: var(--text-secondary); cursor: pointer; }
.quick-asks button:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
.msg { display: flex; gap: 10px; max-width: 85%; animation: fadeIn .3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.ai { align-self: flex-start; }
.msg .avatar { width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; }
.msg.user .avatar { background: var(--primary); color: #fff; }
.msg.ai .avatar { background: #e2e8f0; color: var(--primary); }
.msg .content-col { display: flex; flex-direction: column; min-width: 0; }
.msg .bubble { padding: 10px 14px; border-radius: var(--radius); font-size: 14px; line-height: 1.65; word-break: break-word; }
.msg.user .bubble { background: var(--user-bubble); color: #fff; border-bottom-right-radius: 4px; }
.msg.ai .bubble { background: var(--ai-bubble); color: var(--text); border-bottom-left-radius: 4px; }
.think-steps { margin-top: 6px; }
.think-step { font-size: 11px; padding: 4px 8px; border-radius: 6px; margin-bottom: 2px; animation: fadeIn .2s ease; }
.think-step.running { background: #fefce8; color: #a16207; }
.think-step.done { background: #f0fdf4; color: #166534; }
.think-step.error { background: #fef2f2; color: var(--danger); }
.dots { display: flex; gap: 4px; }
.dots span { width: 6px; height: 6px; border-radius: 50%; background: #94a3b8; animation: bounce 1.4s infinite ease-in-out both; }
.dots span:nth-child(1) { animation-delay: -0.32s; } .dots span:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
.msg.ai.error .bubble { background: #fef2f2; border: 1px solid #fecaca; color: var(--danger); }
.input-area { background: var(--surface); border-top: 1px solid var(--border); padding: 12px 16px; flex-shrink: 0; }
.input-inner { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
.input-inner textarea { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 12px; font-size: 14px; outline: none; resize: none; font-family: inherit; line-height: 1.5; max-height: 120px; }
.input-inner textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
.input-inner button { width: 40px; height: 40px; border: none; border-radius: 12px; background: var(--primary); color: #fff; cursor: pointer; font-size: 18px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.input-inner button:hover { background: #4338ca; }
.input-inner button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">AI</div>
  <div style="flex:1"><h1 style="font-size:16px;font-weight:600;">业务 AI 助手</h1><p style="font-size:11px;color:var(--text-secondary);">产品 · 厂家 · 出货 · 原料 · 库存</p></div>
  <span id="sessionBadge" style="font-size:10px;color:var(--text-secondary);background:var(--bg);padding:4px 8px;border-radius:10px;display:none;"></span>
  <button id="clearCtxBtn" style="font-size:10px;padding:4px 8px;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;display:none;">清空上下文</button>
</div>
<div class="chat" id="chat">
  <div class="chat-inner" id="chatInner">
    <div class="welcome" id="welcome">
      <h2>有什么可以帮你？</h2>
      <p>试试下面的问题，或直接输入你想查询的业务数据</p>
      <div class="quick-asks">
        <button data-q="有哪些厂家？">有哪些厂家？</button>
        <button data-q="上个月哪个产品的出货金额最高？">出货金额排行</button>
        <button data-q="这个月ABS用了多少？">这个月ABS用了多少？</button>
        <button data-q="这个月库存情况？">这个月库存情况？</button>
        <button data-q="库存是怎么算的？">库存是怎么算的？</button>
        <button data-q="今天的出库单">今天的出库单</button>
      </div>
    </div>
  </div>
</div>
<div class="input-area">
  <div class="input-inner">
    <textarea id="input" rows="1" placeholder="输入问题，回车发送" autofocus></textarea>
    <button id="sendBtn" title="发送">↑</button>
  </div>
</div>
<script>
const chatInner = document.getElementById('chatInner');
const welcome = document.getElementById('welcome');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const sessionBadge = document.getElementById('sessionBadge');
const clearCtxBtn = document.getElementById('clearCtxBtn');
let currentAiMsg = null, currentSteps = null, socket = null, sessionId = null, meta = {};

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function scrollDown() { document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight; }

function addUserMsg(text) {
  welcome.style.display = 'none';
  const div = document.createElement('div'); div.className = 'msg user';
  div.innerHTML = '<div class="avatar">我</div><div class="content-col"><div class="bubble">' + escapeHtml(text) + '</div></div>';
  chatInner.appendChild(div); scrollDown();
}

function startAiMsg() {
  const div = document.createElement('div'); div.className = 'msg ai';
  const col = document.createElement('div'); col.className = 'content-col';
  col.innerHTML = '<div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>';
  div.innerHTML = '<div class="avatar">AI</div>'; div.appendChild(col);
  chatInner.appendChild(div);
  currentAiMsg = { div, col }; currentSteps = null; scrollDown();
}

function setAiBubble(html) {
  if (!currentAiMsg) return;
  currentAiMsg.col.querySelector('.bubble').innerHTML = html; scrollDown();
}

function getSteps() {
  if (!currentSteps) { currentSteps = document.createElement('div'); currentSteps.className = 'think-steps'; currentAiMsg.col.appendChild(currentSteps); }
  return currentSteps;
}

function addStep(id, icon, text, status) {
  const steps = getSteps();
  let el = steps.querySelector('[data-step=\"' + id + '\"]');
  if (!el) { el = document.createElement('div'); el.className = 'think-step ' + status; el.setAttribute('data-step', id); el.innerHTML = '<span>' + icon + '</span> <span>' + text + '</span>'; steps.appendChild(el); }
  else { el.className = 'think-step ' + status; el.innerHTML = '<span>' + icon + '</span> <span>' + text + '</span>'; }
  scrollDown(); return el;
}

function finishAiMsg(answer, m) {
  if (m.queryMode === 'agent') {
    const warn = document.createElement('div');
    warn.style.cssText = 'font-size:11px;color:#92400e;background:#fef3c7;padding:6px 10px;border-radius:6px;margin-top:6px;';
    warn.textContent = '该答案由 AI Agent 生成，已对每一步 SQL 执行安全检查。';
    currentAiMsg.col.appendChild(warn);
  }
  setAiBubble(escapeHtml(answer).replace(/\n/g, '<br>'));
  if (currentSteps) {
    currentSteps.querySelectorAll('.think-step.running').forEach(function(el) {
      el.className = 'think-step done';
    });
  }
  currentAiMsg = null; currentSteps = null; scrollDown();
}

function showError(msg) {
  if (!currentAiMsg) startAiMsg();
  setAiBubble(escapeHtml(msg)); currentAiMsg.div.classList.add('error');
  if (currentSteps) { currentSteps.querySelectorAll('.think-step.running').forEach(function(el) { el.className = 'think-step error'; }); }
  sendBtn.disabled = false;
}

async function ask(question) {
  sendBtn.disabled = true; startAiMsg(); meta = {};
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = proto + '//' + location.host + '/ws/chat';
  socket = new WebSocket(wsUrl);
  let answerText = '';

  socket.onopen = function() { socket.send(JSON.stringify({ question, sessionId })); };

  socket.onmessage = function(e) {
    var data = JSON.parse(e.data);
    switch (data.event) {
      case 'session':
        sessionId = data.sessionId; sessionBadge.textContent = '会话: ' + sessionId.slice(0, 8); sessionBadge.style.display = ''; clearCtxBtn.style.display = ''; break;
      case 'thinking': addStep(data.step || 'agent', '⏳', data.text, 'running'); break;
      case 'planning_start': addStep('plan', '🧠', data.text, 'running'); break;
      case 'plan_ready':
        addStep('plan', '✅', '计划: ' + ((data.plan && data.plan.goal) || data.taskType || '') + ' (' + ((data.plan && data.plan.steps) ? data.plan.steps.length : 0) + '步)', 'done');
        meta.plan = data.plan; break;
      case 'step_start': addStep('step' + data.stepId, '⏳', 'S' + data.stepId + ': ' + (data.name || '') + ' — ' + (data.purpose || ''), 'running'); break;
      case 'sql_generated':
        var el = addStep('step' + data.stepId, '🔧', 'SQL已生成 (风险:' + (data.riskLevel || '-') + ')', 'running');
        if (data.sql) { var pre = document.createElement('pre'); pre.style.cssText = 'font-size:10px;background:#1e293b;color:#e2e8f0;padding:6px;border-radius:4px;margin-top:4px;white-space:pre-wrap;word-break:break-all;max-height:100px;overflow-y:auto;'; pre.textContent = data.sql; el.appendChild(pre); }
        break;
      case 'sql_checked': addStep('check' + data.stepId, '✅', data.text || '安全检查通过', 'done'); break;
      case 'explain_done': addStep('explain' + data.stepId, '✅', '预估: ' + (data.estimatedRows || 0) + '行', 'done'); break;
      case 'step_done':
        addStep('step' + data.stepId, '✅', 'S' + data.stepId + ': ' + (data.name || '') + ' — ' + data.rowCount + '行 ' + (data.durationMs || 0) + 'ms', 'done');
        break;
      case 'step_skipped': addStep('step' + data.stepId, '⏭️', 'S' + data.stepId + ' 跳过: ' + (data.reason || ''), 'done'); break;
      case 'step_error': addStep('step' + data.stepId, '❌', 'S' + data.stepId + ' 失败: ' + (data.errorCode || '') + ' — ' + (data.errorMsg || ''), 'done'); break;
      case 'answer_start': addStep('answer', '⏳', data.text || '生成回答中...', 'running'); break;
      case 'answer_chunk': answerText += data.text; setAiBubble(escapeHtml(answerText).replace(/\n/g, '<br>')); break;
      case 'answer_done':
        if (!answerText && data.answer) { answerText = data.answer; setAiBubble(escapeHtml(answerText).replace(/\n/g, '<br>')); }
        addStep('answer', '✅', '回答完成', 'done'); break;
      case 'done':
        meta.durationMs = data.durationMs; meta.queryMode = data.queryMode; if (data.plan) meta.plan = data.plan;
        if (!answerText && data.answer) answerText = data.answer;
        finishAiMsg(answerText, meta); sendBtn.disabled = false; socket.close(); break;
      case 'error': showError(data.message || data.errorMsg || '未知错误'); socket.close(); break;
    }
  };
  socket.onerror = function() { showError('连接失败'); sendBtn.disabled = false; };
}

input.addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); } });
input.addEventListener('input', function() { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 120) + 'px'; });
sendBtn.addEventListener('click', function() { var q = input.value.trim(); if (!q || sendBtn.disabled) return; addUserMsg(q); input.value = ''; input.style.height = 'auto'; ask(q); });
clearCtxBtn.addEventListener('click', function() {
  if (sessionId) { fetch('/api/ai/memory/clear', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sessionId }) }); }
  sessionBadge.style.display = 'none'; clearCtxBtn.style.display = 'none'; sessionId = null; addUserMsg('[已清空上下文]');
});
document.querySelectorAll('.quick-asks button').forEach(function(btn) { btn.addEventListener('click', function() { if (sendBtn.disabled) return; var q = btn.dataset.q; addUserMsg(q); ask(q); }); });
</script>
</body>
</html>
