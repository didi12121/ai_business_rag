<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>业务 AI 助手</title>
<style>
:root {
  --primary: #4f46e5;
  --primary-light: #eef2ff;
  --bg: #f8fafc;
  --surface: #ffffff;
  --border: #e2e8f0;
  --text: #1e293b;
  --text-secondary: #64748b;
  --user-bubble: #4f46e5;
  --ai-bubble: #f1f5f9;
  --danger: #ef4444;
  --success: #10b981;
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column;
}
.header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.header .logo { width: 32px; height: 32px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; font-weight: 700; }
.header h1 { font-size: 16px; font-weight: 600; }
.header p { font-size: 11px; color: var(--text-secondary); }

.chat { flex: 1; overflow-y: auto; padding: 16px 0; }
.chat-inner { max-width: 800px; margin: 0 auto; padding: 0 16px; display: flex; flex-direction: column; gap: 6px; }

.welcome { text-align: center; padding: 40px 20px 20px; }
.welcome h2 { font-size: 20px; margin-bottom: 6px; }
.welcome p { color: var(--text-secondary); font-size: 13px; margin-bottom: 20px; }
.quick-asks { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 600px; margin: 0 auto; }
.quick-asks button {
  font-size: 12px; padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px;
  background: var(--surface); color: var(--text-secondary); cursor: pointer; transition: all .15s;
}
.quick-asks button:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

/* Messages */
.msg { display: flex; gap: 10px; max-width: 85%; animation: fadeIn .3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.ai { align-self: flex-start; }
.msg .avatar {
  width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 13px;
}
.msg.user .avatar { background: var(--primary); color: #fff; }
.msg.ai .avatar { background: #e2e8f0; color: var(--primary); }
.msg .content-col { display: flex; flex-direction: column; min-width: 0; }
.msg .bubble {
  padding: 10px 14px; border-radius: var(--radius); font-size: 14px; line-height: 1.65; word-break: break-word;
}
.msg.user .bubble { background: var(--user-bubble); color: #fff; border-bottom-right-radius: 4px; }
.msg.ai .bubble { background: var(--ai-bubble); color: var(--text); border-bottom-left-radius: 4px; }

/* Thinking steps */
.think-steps { margin-top: 6px; }
.think-step { font-size: 12px; padding: 6px 10px; border-radius: 8px; margin-bottom: 3px; display: flex; align-items: center; gap: 8px; animation: fadeIn .2s ease; }
.think-step.running { background: #fefce8; color: #a16207; }
.think-step.done { background: #f0fdf4; color: #166534; }
.think-step .step-icon { width: 16px; text-align: center; flex-shrink: 0; }
.think-step .step-text { flex: 1; min-width: 0; }
.think-step .step-detail { font-size: 11px; color: var(--text-secondary); }

/* Expandable panels */
.msg .extra-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.msg .extra-btns button {
  font-size: 11px; padding: 3px 10px; border: 1px solid var(--border); border-radius: 12px;
  background: var(--surface); color: var(--text-secondary); cursor: pointer;
}
.msg .extra-btns button:hover { border-color: var(--primary); color: var(--primary); }
.msg .extra-btns button.active { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
.msg .data-panel { margin-top: 6px; }
.msg .data-panel > div { display: none; }
.msg .data-panel > div.show { display: block; }
.msg .data-panel .table-wrap { overflow-x: auto; max-height: 300px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; }
.msg .data-panel table { width: 100%; border-collapse: collapse; font-size: 12px; }
.msg .data-panel th { background: #f8fafc; padding: 6px 10px; text-align: left; font-weight: 500; border-bottom: 2px solid var(--border); white-space: nowrap; position: sticky; top: 0; }
.msg .data-panel td { padding: 5px 10px; border-bottom: 1px solid #f1f5f9; }
.msg .data-panel pre {
  background: #1e293b; color: #e2e8f0; padding: 12px; border-radius: 8px;
  font-size: 11px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto;
}

/* Loading dots */
.dots { display: flex; gap: 4px; }
.dots span { width: 6px; height: 6px; border-radius: 50%; background: #94a3b8; animation: bounce 1.4s infinite ease-in-out both; }
.dots span:nth-child(1) { animation-delay: -0.32s; }
.dots span:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

/* Error */
.msg.ai.error .bubble { background: #fef2f2; border: 1px solid #fecaca; color: var(--danger); }

/* Input */
.input-area { background: var(--surface); border-top: 1px solid var(--border); padding: 12px 16px; flex-shrink: 0; }
.input-inner { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
.input-inner textarea {
  flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 12px;
  font-size: 14px; outline: none; resize: none; font-family: inherit; line-height: 1.5; max-height: 120px;
}
.input-inner textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
.input-inner button {
  width: 40px; height: 40px; border: none; border-radius: 12px; background: var(--primary);
  color: #fff; cursor: pointer; font-size: 18px; flex-shrink: 0; transition: background .15s;
  display: flex; align-items: center; justify-content: center;
}
.input-inner button:hover { background: #4338ca; }
.input-inner button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">AI</div>
  <div><h1>业务 AI 助手</h1><p>产品 · 厂家 · 出货 · 原料 · 库存</p></div>
</div>

<div class="chat" id="chat">
  <div class="chat-inner" id="chatInner">
    <div class="welcome" id="welcome">
      <h2>有什么可以帮你？</h2>
      <p>试试下面的问题，或直接输入你想查询的业务数据</p>
      <div class="quick-asks">
        <button data-q="有哪些厂家？">有哪些厂家？</button>
        <button data-q="壮森有哪些产品？">壮森有哪些产品？</button>
        <button data-q="TDX-01-ABS有什么胶件？">TDX-01-ABS有什么胶件？</button>
        <button data-q="这个月ABS用了多少？">这个月ABS用了多少？</button>
        <button data-q="这个月库存情况？">这个月库存情况？</button>
        <button data-q="库存是怎么算的？">库存是怎么算的？</button>
      </div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-inner">
    <textarea id="input" rows="1" placeholder="输入问题，回车发送" autofocus></textarea>
    <button id="sendBtn" title="发送">↑</button>
  </div>
</div>

<script>
const chatInner = document.getElementById('chatInner');
const welcome = document.getElementById('welcome');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
let currentAiMsg = null;
let currentSteps = null;
let socket = null;

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function scrollDown() {
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}

function addUserMsg(text) {
  welcome.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = '<div class="avatar">我</div><div class="content-col"><div class="bubble">' + escapeHtml(text) + '</div></div>';
  chatInner.appendChild(div);
  scrollDown();
}

function startAiMsg() {
  const div = document.createElement('div');
  div.className = 'msg ai';
  const col = document.createElement('div');
  col.className = 'content-col';
  col.innerHTML = '<div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>';
  div.innerHTML = '<div class="avatar">AI</div>';
  div.appendChild(col);
  chatInner.appendChild(div);
  currentAiMsg = { div, col };
  currentSteps = null;
  scrollDown();
}

function setAiBubble(html) {
  if (!currentAiMsg) return;
  currentAiMsg.col.querySelector('.bubble').innerHTML = html;
  scrollDown();
}

function getSteps() {
  if (!currentSteps) {
    currentSteps = document.createElement('div');
    currentSteps.className = 'think-steps';
    currentAiMsg.col.appendChild(currentSteps);
  }
  return currentSteps;
}

function addStep(id, icon, text, status) {
  const steps = getSteps();
  let el = steps.querySelector('[data-step="' + id + '"]');
  if (!el) {
    el = document.createElement('div');
    el.className = 'think-step ' + status;
    el.setAttribute('data-step', id);
    el.innerHTML = '<span class="step-icon">' + icon + '</span><span class="step-text">' + text + '</span>';
    steps.appendChild(el);
  } else {
    el.className = 'think-step ' + status;
    el.querySelector('.step-icon').textContent = icon;
    el.querySelector('.step-text').textContent = text;
  }
  scrollDown();
  return el;
}

function addExtras() {
  if (currentAiMsg._extras) return currentAiMsg._extras;
  const extras = document.createElement('div');
  extras.style.cssText = 'margin-top:4px;';
  currentAiMsg.col.appendChild(extras);
  currentAiMsg._extras = extras;
  return extras;
}

function addExtraButtons(meta) {
  const extras = addExtras();
  // remove old
  extras.querySelectorAll('.extra-btns, .data-panel').forEach(e => e.remove());

  const btnRow = document.createElement('div');
  btnRow.className = 'extra-btns';
  const dataPanel = document.createElement('div');
  dataPanel.className = 'data-panel';
  extras.appendChild(btnRow);
  extras.appendChild(dataPanel);

  if (meta.rows && meta.rows.length > 0) {
    const btn = document.createElement('button');
    btn.textContent = '📊 数据 (' + meta.rows.length + '行)';
    const block = document.createElement('div');
    block.className = 'table-block';
    const wrap = document.createElement('div');
    wrap.className = 'table-wrap';
    const keys = Object.keys(meta.rows[0]);
    let html = '<table><thead><tr>';
    keys.forEach(k => { html += '<th>' + escapeHtml(k) + '</th>'; });
    html += '</tr></thead><tbody>';
    meta.rows.forEach(row => {
      html += '<tr>';
      keys.forEach(k => {
        const v = row[k];
        html += '<td>' + (v != null ? escapeHtml(String(v)) : '<span style="color:#9ca3af">-</span>') + '</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
    wrap.innerHTML = html;
    block.appendChild(wrap);
    dataPanel.appendChild(block);
    btn.onclick = function() { block.classList.toggle('show'); btn.classList.toggle('active'); };
    btnRow.appendChild(btn);
  }

  if (meta.sql) {
    const btn = document.createElement('button');
    btn.textContent = '🔍 SQL';
    const block = document.createElement('div');
    block.className = 'sql-block';
    block.innerHTML = '<pre>' + escapeHtml(meta.sql) + '</pre>';
    dataPanel.appendChild(block);
    btn.onclick = function() { block.classList.toggle('show'); btn.classList.toggle('active'); };
    btnRow.appendChild(btn);
  }
}

function finishAiMsg(answer, meta) {
  // Free SQL warning
  if (meta.queryMode === 'free_sql') {
    const warn = document.createElement('div');
    warn.style.cssText = 'font-size:11px;color:#92400e;background:#fef3c7;padding:6px 10px;border-radius:6px;margin-top:6px;';
    warn.textContent = '⚠ 该 SQL 由 AI 根据表结构自动生成，已通过只读和安全检查。风险等级: ' + (meta.riskLevel || '-');
    currentAiMsg.col.appendChild(warn);
  }
  setAiBubble(escapeHtml(answer).replace(/\n/g, '<br>'));
  addExtraButtons(meta || {});
  if (currentSteps) {
    currentSteps.querySelectorAll('.think-step.running').forEach(el => {
      el.className = 'think-step done';
      if (el.getAttribute('data-step') === 'answer') {
        el.querySelector('.step-icon').textContent = '✅';
        el.querySelector('.step-text').textContent = '回答完成 (' + (meta.durationMs || 0) + 'ms)';
      }
    });
  }
  currentAiMsg = null;
  currentSteps = null;
  scrollDown();
}

function showError(msg) {
  if (!currentAiMsg) startAiMsg();
  setAiBubble(escapeHtml(msg));
  currentAiMsg.div.classList.add('error');
  if (currentSteps) {
    currentSteps.querySelectorAll('.think-step.running').forEach(el => {
      el.className = 'think-step done';
      el.querySelector('.step-icon').textContent = '❌';
    });
  }
  sendBtn.disabled = false;
}

async function ask(question) {
  sendBtn.disabled = true;
  startAiMsg();

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = proto + '//' + location.host + '/ws/chat';

  socket = new WebSocket(wsUrl);
  let answerText = '';
  let meta = {};
  let currentAnswerStep = null;

  socket.onopen = () => {
    socket.send(JSON.stringify({ question }));
  };

  socket.onmessage = (e) => {
    const data = JSON.parse(e.data);

    switch (data.event) {
      case 'thinking':
        if (data.step === 'agent') {
          addStep('agent', '🧠', data.text, 'running');
        } else if (data.step === 'intent') {
          addStep('intent', '⏳', data.text, 'running');
        } else if (data.step === 'free_sql') {
          addStep('free_sql', '🤖', data.text, 'running');
        } else if (data.step === 'safety') {
          addStep('safety', '⏳', data.text, 'running');
        } else if (data.step === 'explain') {
          addStep('explain', '⏳', data.text, 'running');
        } else if (data.step === 'query') {
          addStep('query', '⏳', data.text, 'running');
        }
        break;

      case 'plan_ready':
        addStep('agent', '✅', '规划完成: ' + (data.goal || data.taskType || ''), 'done');
        meta.plan = data.plan;
        break;

      case 'step_done':
        addStep('step' + data.stepId, '✅',
          'Step ' + data.stepId + ': ' + (data.name || data.purpose || '') +
          ' (' + data.rowCount + '行, ' + (data.durationMs || 0) + 'ms)', 'done');
        break;

      case 'intent_done':
        addStep('intent', '✅', '意图: ' + data.intent + ' (' + (data.confidence * 100).toFixed(0) + '%) [' + data.source + ']', 'done');
        if (data.reason && data.source === 'llm') {
          const el = document.querySelector('[data-step="intent"]');
          if (el) {
            const detail = document.createElement('span');
            detail.className = 'step-detail';
            detail.textContent = ' — ' + data.reason;
            el.appendChild(detail);
          }
        }
        meta.intent = data.intent;
        meta.confidence = data.confidence;
        break;

      case 'sql_ready':
        addStep('sql', '✅', 'SQL 已生成 (' + data.template + ')', 'done');
        meta.sql = data.sql;
        meta.params = data.params;
        addStep('safety', '⏳', '正在安全检查...', 'running');
        break;

      case 'free_sql_reason':
        addStep('free_sql', '✅', 'AI 生成 SQL: ' + (data.reason || '').slice(0, 80), 'done');
        if (data.riskLevel) meta.riskLevel = data.riskLevel;
        if (data.usedTables) meta.usedTables = data.usedTables;
        break;

      case 'query_done':
        addStep('safety', '✅', '安全检查通过', 'done');
        if (document.querySelector('[data-step="explain"]')) {
          addStep('explain', '✅', '预估行数: ' + (data.estimatedRows || 'N/A'), 'done');
        }
        addStep('query', '✅', '查询完成: ' + data.rowCount + ' 行', 'done');
        meta.rows = data.rows;
        meta.rowCount = data.rowCount;
        meta.estimatedRows = data.estimatedRows;
        break;

      case 'answer_start':
        currentAnswerStep = addStep('answer', '⏳', '正在生成回答...', 'running');
        break;

      case 'answer_chunk':
        answerText += data.text;
        if (currentAnswerStep) {
          currentAnswerStep.querySelector('.step-text').textContent = '正在生成回答... ' + answerText.length + ' 字';
        }
        setAiBubble(escapeHtml(answerText).replace(/\n/g, '<br>'));
        break;

      case 'done':
        meta.durationMs = data.durationMs;
        meta.queryMode = data.queryMode;
        if (data.freeSqlReason) meta.freeSqlReason = data.freeSqlReason;
        if (data.riskLevel) meta.riskLevel = data.riskLevel;
        if (data.usedTables) meta.usedTables = data.usedTables;
        if (data.estimatedRows) meta.estimatedRows = data.estimatedRows;
        finishAiMsg(answerText, meta);
        sendBtn.disabled = false;
        socket.close();
        break;

      case 'error':
        showError(data.message);
        socket.close();
        break;
    }
  };

  socket.onerror = () => {
    showError('连接失败，请重试');
    sendBtn.disabled = false;
  };

  socket.onclose = () => {
    if (sendBtn.disabled && currentAiMsg) {
      // unexpected close
    }
  };
}

// Input handling
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendBtn.click();
  }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

sendBtn.addEventListener('click', () => {
  const q = input.value.trim();
  if (!q || sendBtn.disabled) return;
  addUserMsg(q);
  input.value = '';
  input.style.height = 'auto';
  ask(q);
});

document.querySelectorAll('.quick-asks button').forEach(btn => {
  btn.addEventListener('click', () => {
    if (sendBtn.disabled) return;
    const q = btn.dataset.q;
    addUserMsg(q);
    ask(q);
  });
});
</script>
</body>
</html>
